# ============================================================
# CANweeb 設定サンプル
#
# 典型構成: メイン処理 PC (node-main) <-> Raspberry Pi (node-pi)
#   USB Ethernet (主経路, 低遅延) + 通常 LAN/Wi-Fi (フェイルオーバ)
#
# traffic_class の使い分け
#   control   : GPIO 制御, 緊急停止, 状態遷移, 役割コマンド
#               ACK あり / ディスク永続化あり / 再送あり
#   telemetry : IMU, odometry, バッテリ, 推定状態
#               ACK なし / メモリのみ / topic キャッシュに最新値保持
#   stream    : カメラ, RGB-D, LiDAR, 大容量バイナリ
#               ACK なし / メモリのみ / chunked 転送
#
# 高頻度センサ (100 Hz 以上) を control に載せないこと。
# SD/eMMC が摩耗し、制御系のレイテンシも悪化する。
# ============================================================

[node]
node_id = "node-pi"
role = "child"
tags = ["robot", "sensor", "actuator"]

[storage]
# control クラスのメッセージのみここに永続化される
root = "../data"
# 配送済み control メッセージの保持期間 (秒)
retention_seconds = 86400

[web]
# デバッグ WebUI と HTTP API
bind = "0.0.0.0:8080"

[transport]
# USB Gadget Ethernet (Pi OTG) 経由の主経路
usb_listen = "0.0.0.0:7001"
# 通常 LAN / Wi-Fi / 直結 Ethernet / ルーター配下ネットワーク経由の経路
network_listen = "0.0.0.0:7002"
# 接続リトライ間隔 (ms)
connect_interval_ms = 1500
# Ping/Pong ハートビート間隔 (ms)
heartbeat_interval_ms = 1000
# control ACK タイムアウト (ms)
ack_timeout_ms = 2500
# メッシュ転送の最大ホップ数
max_hops = 4

[discovery]
# 同一 LAN 内で peer を自動検知する
enabled = true
bind = "0.0.0.0:7060"
announce_addr = "255.255.255.255:7060"
announce_interval_ms = 1500
peer_ttl_ms = 8000

[wifi]
interface = "wlan0"
# 既存 LAN / 既存 Wi-Fi をそのまま使うだけなら false にできる
auto_manage = true
# child は fallback_networks の優先順で SSID を選ぶ
desired_mode = "child"
hotspot_ssid = "CANweeb-Parent"
hotspot_password = "canweeb1234"
hotspot_connection_name = "CANweeb Hotspot"
status_interval_ms = 2000

[[wifi.fallback_networks]]
# priority が高いほど優先。親 AP を最優先したいなら高くする
ssid = "CANweeb-Parent"
password = "canweeb1234"
priority = 100

# ---- ピア定義 ----
# usb_addr      : USB Gadget Ethernet 経由のアドレス (優先)
# network_addr  : LAN/Wi-Fi アドレス（固定 IP を使う場合だけ設定）
# discovery.enabled = true の場合、network_addr を省略しても自動検知で接続可能

[[peers]]
node_id = "node-main"
role = "parent"
relationship = "parent"
preferred_transport_order = ["usb", "network"]
usb_addr = "192.168.7.1:7001"
# network_addr = "192.168.1.10:7002"
tags = ["strategy", "ai"]

