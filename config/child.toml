# ============================================================
# Child (Raspberry Pi) 設定
# ============================================================

[node]
node_id = "child"
role = "child"
tags = ["robot", "actuator"]

[storage]
root = "./data/child"
retention_seconds = 86400

[web]
# 子の WebUI も起動（デバッグ用）
bind = "0.0.0.0:8080"

[transport]
# LAN ケーブル直結 / 同一 LAN 上の有線 Ethernet を主経路にする
network_listen = "0.0.0.0:7002"
connect_interval_ms = 1500
heartbeat_interval_ms = 1000
ack_timeout_ms = 2500
max_hops = 4

[discovery]
enabled = true
bind = "0.0.0.0:7060"
announce_addr = "255.255.255.255:7060"
announce_interval_ms = 1500
peer_ttl_ms = 8000

[wifi]
interface = "wlan0"
# 有線が切れたら fallback_networks の優先順で親 AP へ接続する
auto_manage = true
desired_mode = "child"
hotspot_ssid = "CANweeb-Parent"
hotspot_password = "canweeb1234"
hotspot_connection_name = "CANweeb Hotspot"
status_interval_ms = 2000

[[wifi.fallback_networks]]
# priority が高いほど優先。親 AP を最優先したいならこれを最大にする
ssid = "CANweeb-Parent"
password = "canweeb1234"
priority = 100

[[peers]]
node_id = "parent"
role = "parent"
relationship = "parent"
preferred_transport_order = ["network"]
# LAN ケーブル直結の親側 Ethernet アドレス
network_addr = "10.42.0.1:7002"
tags = ["control", "ui"]
